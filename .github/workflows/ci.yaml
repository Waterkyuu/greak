name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Gleam and Erlang
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.16.0"
          rebar3-version: "latest"

      - name: Check formatting
        run: gleam format --check .

      - name: Run tests
        run: gleam test

      - name: Build project
        run: gleam build
